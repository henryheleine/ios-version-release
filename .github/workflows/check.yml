# This workflow periodically runs to compare iOS Release versions
#
name: Run Node Script on Cron

on:
  schedule:
    # Runs every day at 01:00 AM UTC (adjust for your local timezone)
    - cron: '*/45 * * * *'
  # Allows manual runs from the Actions tab
  workflow_dispatch: 

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Node process
        run: node index.js